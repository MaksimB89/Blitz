<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#0c0a09" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Blitz" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/png" href="favicon.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<title>Blitz · Sprachnotizen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&family=JetBrains+Mono:wght@400;500&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c0a09;
    --bg-soft:#161312;
    --bg-card:#1c1816;
    --border:#2a2422;
    --text:#f5efe7;
    --muted:#8a8178;
    --dim:#5a534c;
    --accent:#f59e0b;
    --accent-hot:#fb923c;
    --danger:#ef4444;
    --ok:#10b981;
    --radius:14px;
    --shadow:0 1px 0 rgba(255,255,255,.04) inset, 0 20px 40px -20px rgba(0,0,0,.6);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter Tight',system-ui,sans-serif;overscroll-behavior-y:none}
  body{
    min-height:100dvh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(245,158,11,.08), transparent 60%),
      radial-gradient(ellipse 60% 40% at 50% 110%, rgba(251,146,60,.05), transparent 60%);
    background-attachment:fixed;
  }
  .wrap{max-width:560px;margin:0 auto;padding:18px 16px 140px}

  /* Header */
  header{display:flex;align-items:center;justify-content:space-between;margin:8px 0 24px}
  .brand{display:flex;align-items:baseline;gap:10px}
  .brand h1{
    font-family:'Fraunces',serif;font-weight:500;font-style:italic;
    font-size:34px;margin:0;letter-spacing:-.02em;line-height:1
  }
  .brand .bolt{color:var(--accent);font-size:22px;transform:translateY(-2px)}
  .brand small{color:var(--muted);font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
  .icon-btn{
    background:transparent;border:1px solid var(--border);color:var(--muted);
    width:38px;height:38px;border-radius:10px;display:grid;place-items:center;cursor:pointer;
    transition:all .15s ease
  }
  .icon-btn:hover{color:var(--text);border-color:var(--dim)}
  .icon-btn:active{transform:scale(.95)}

  /* Recorder */
  .recorder{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:22px;
    padding:28px 22px 24px;
    margin-bottom:22px;
    box-shadow:var(--shadow);
    position:relative;overflow:hidden
  }
  .recorder::before{
    content:'';position:absolute;inset:0;
    background:radial-gradient(circle at 50% 0%, rgba(245,158,11,.08), transparent 60%);
    pointer-events:none
  }
  .rec-status{
    text-align:center;font-family:'JetBrains Mono',monospace;
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);
    margin-bottom:14px;height:14px
  }
  .rec-status.live{color:var(--accent-hot)}
  .timer{
    text-align:center;
    font-family:'Fraunces',serif;font-weight:300;
    font-size:54px;line-height:1;letter-spacing:-.03em;
    color:var(--text);margin-bottom:22px;
    font-variant-numeric:tabular-nums;
    transition:color .2s
  }
  .timer.live{color:var(--accent)}

  .rec-controls{display:flex;justify-content:center;align-items:center;gap:18px;position:relative;z-index:1}
  .rec-btn{
    width:96px;height:96px;border-radius:50%;
    background:linear-gradient(180deg, var(--accent-hot), var(--accent));
    border:none;cursor:pointer;
    display:grid;place-items:center;
    box-shadow:
      0 0 0 6px rgba(245,158,11,.12),
      0 12px 28px -6px rgba(245,158,11,.5),
      inset 0 1px 0 rgba(255,255,255,.3);
    transition:transform .15s, box-shadow .25s
  }
  .rec-btn:active{transform:scale(.94)}
  .rec-btn.recording{
    background:linear-gradient(180deg, #fda4af, #ef4444);
    box-shadow:
      0 0 0 6px rgba(239,68,68,.18),
      0 12px 28px -6px rgba(239,68,68,.6),
      inset 0 1px 0 rgba(255,255,255,.3);
    animation:pulse 1.6s ease-in-out infinite
  }
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 6px rgba(239,68,68,.18),0 12px 28px -6px rgba(239,68,68,.6),inset 0 1px 0 rgba(255,255,255,.3)}
    50%{box-shadow:0 0 0 14px rgba(239,68,68,.05),0 12px 28px -6px rgba(239,68,68,.4),inset 0 1px 0 rgba(255,255,255,.3)}
  }
  .rec-btn svg{width:34px;height:34px;color:#1a0f00}
  .rec-btn.recording svg{color:#fff}

  .hint{text-align:center;color:var(--dim);font-size:12px;margin-top:14px;font-family:'JetBrains Mono',monospace;letter-spacing:.05em}

  /* Waveform */
  .wave{display:flex;align-items:center;justify-content:center;gap:3px;height:32px;margin-bottom:14px;opacity:0;transition:opacity .2s}
  .wave.live{opacity:1}
  .wave span{display:block;width:3px;background:var(--accent);border-radius:3px;height:6px;transition:height .08s}

  /* Search */
  .search{
    display:flex;align-items:center;gap:10px;
    background:var(--bg-soft);border:1px solid var(--border);
    border-radius:12px;padding:10px 14px;margin-bottom:18px
  }
  .search input{
    flex:1;background:transparent;border:none;outline:none;color:var(--text);
    font-family:inherit;font-size:14px
  }
  .search input::placeholder{color:var(--dim)}
  .search svg{color:var(--dim);flex-shrink:0}

  /* Notes List */
  .day-group{margin-bottom:24px}
  .day-label{
    display:flex;align-items:center;gap:10px;
    font-family:'JetBrains Mono',monospace;font-size:11px;
    letter-spacing:.18em;text-transform:uppercase;color:var(--muted);
    margin-bottom:10px;padding:0 4px
  }
  .day-label::after{content:'';flex:1;height:1px;background:var(--border)}
  .day-label .count{color:var(--dim);background:var(--bg-soft);padding:2px 8px;border-radius:20px;font-size:10px;letter-spacing:.1em}

  .note{
    background:var(--bg-card);border:1px solid var(--border);
    border-radius:var(--radius);padding:14px;margin-bottom:8px;
    display:flex;align-items:center;gap:12px;
    transition:border-color .15s
  }
  .note:hover{border-color:var(--dim)}
  .play-btn{
    width:44px;height:44px;border-radius:50%;
    background:var(--bg-soft);border:1px solid var(--border);
    color:var(--accent);cursor:pointer;flex-shrink:0;
    display:grid;place-items:center;transition:all .15s
  }
  .play-btn:hover{background:var(--accent);color:var(--bg)}
  .play-btn:active{transform:scale(.92)}
  .play-btn.playing{background:var(--accent);color:var(--bg)}

  .note-info{flex:1;min-width:0}
  .note-time{
    font-family:'Fraunces',serif;font-weight:500;font-size:18px;
    line-height:1.1;letter-spacing:-.01em;
    margin-bottom:3px;font-variant-numeric:tabular-nums
  }
  .note-meta{
    display:flex;align-items:center;gap:8px;
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)
  }
  .note-meta .dot{width:3px;height:3px;background:var(--dim);border-radius:50%}
  .progress{
    height:2px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden;
    opacity:0;transition:opacity .2s;height:0
  }
  .note.active .progress{opacity:1;height:2px}
  .progress-fill{height:100%;background:var(--accent);width:0%;transition:width .1s linear}

  .note-actions{display:flex;gap:4px;flex-shrink:0}
  .mini-btn{
    background:transparent;border:none;color:var(--dim);
    width:32px;height:32px;border-radius:8px;cursor:pointer;
    display:grid;place-items:center;transition:all .15s
  }
  .mini-btn:hover{color:var(--text);background:var(--bg-soft)}
  .mini-btn.danger:hover{color:var(--danger)}

  /* Empty */
  .empty{
    text-align:center;padding:60px 20px;color:var(--dim);
    font-family:'Fraunces',serif;font-style:italic;font-size:18px
  }
  .empty small{display:block;font-family:'JetBrains Mono',monospace;font-style:normal;
    font-size:11px;letter-spacing:.15em;text-transform:uppercase;margin-top:8px;color:var(--dim)}

  /* Toast */
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);
    background:var(--bg-card);border:1px solid var(--border);
    color:var(--text);padding:10px 18px;border-radius:30px;
    font-size:13px;font-family:'JetBrains Mono',monospace;letter-spacing:.05em;
    box-shadow:var(--shadow);opacity:0;transition:all .3s cubic-bezier(.5,1.5,.5,1);
    z-index:100;max-width:90vw
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.error{border-color:var(--danger);color:#fecaca}

  /* Modal */
  .modal{
    position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;
    display:none;align-items:center;justify-content:center;padding:20px;
    backdrop-filter:blur(4px)
  }
  .modal.show{display:flex}
  .modal-card{
    background:var(--bg-card);border:1px solid var(--border);
    border-radius:18px;padding:24px;max-width:380px;width:100%;
    box-shadow:var(--shadow)
  }
  .modal h3{margin:0 0 8px;font-family:'Fraunces',serif;font-weight:500;font-size:22px}
  .modal p{margin:0 0 18px;color:var(--muted);font-size:14px;line-height:1.5}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end}
  .btn{
    padding:10px 18px;border-radius:10px;border:1px solid var(--border);
    background:var(--bg-soft);color:var(--text);cursor:pointer;
    font-family:inherit;font-size:13px;font-weight:500;
    transition:all .15s
  }
  .btn:hover{border-color:var(--dim)}
  .btn.danger{background:var(--danger);border-color:var(--danger);color:#fff}
  .btn.danger:hover{background:#dc2626}

  @media (max-width:380px){
    .timer{font-size:48px}
    .rec-btn{width:84px;height:84px}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <span class="bolt">⚡</span>
      <h1>Blitz</h1>
      <small>Sprachnotizen</small>
    </div>
    <button class="icon-btn" id="exportBtn" title="Alle exportieren" aria-label="Export">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </button>
  </header>

  <section class="recorder">
    <div class="rec-status" id="recStatus">Bereit</div>
    <div class="timer" id="timer">00:00</div>
    <div class="wave" id="wave"></div>
    <div class="rec-controls">
      <button class="rec-btn" id="recBtn" aria-label="Aufnahme starten">
        <svg id="micIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z"/><path d="M19 11a1 1 0 0 0-2 0 5 5 0 0 1-10 0 1 1 0 0 0-2 0 7 7 0 0 0 6 6.92V20H8a1 1 0 0 0 0 2h8a1 1 0 0 0 0-2h-3v-2.08A7 7 0 0 0 19 11z"/></svg>
        <svg id="stopIcon" style="display:none" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
      </button>
    </div>
    <div class="hint" id="hint">Tippen zum Aufnehmen</div>
  </section>

  <div class="search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="searchInput" placeholder="Nach Datum oder Uhrzeit suchen…" />
  </div>

  <div id="notesList"></div>

</div>

<div class="toast" id="toast"></div>

<div class="modal" id="confirmModal">
  <div class="modal-card">
    <h3>Notiz löschen?</h3>
    <p id="confirmText">Diese Sprachnotiz wird unwiderruflich entfernt.</p>
    <div class="modal-actions">
      <button class="btn" id="cancelBtn">Abbrechen</button>
      <button class="btn danger" id="confirmBtn">Löschen</button>
    </div>
  </div>
</div>

<script>
// ==================== State ====================
const state = {
  recording: false,
  mediaRecorder: null,
  audioStream: null,
  audioChunks: [],
  audioContext: null,
  analyser: null,
  startTime: 0,
  timerInterval: null,
  waveInterval: null,
  notes: [],
  currentAudio: null,
  currentPlayingId: null,
  pendingDeleteId: null,
  mimeType: '',
  maxDurationSec: 600, // 10 min
};

const MAX_BARS = 32;
const els = {
  recBtn: document.getElementById('recBtn'),
  micIcon: document.getElementById('micIcon'),
  stopIcon: document.getElementById('stopIcon'),
  timer: document.getElementById('timer'),
  status: document.getElementById('recStatus'),
  hint: document.getElementById('hint'),
  wave: document.getElementById('wave'),
  list: document.getElementById('notesList'),
  toast: document.getElementById('toast'),
  search: document.getElementById('searchInput'),
  exportBtn: document.getElementById('exportBtn'),
  modal: document.getElementById('confirmModal'),
  cancelBtn: document.getElementById('cancelBtn'),
  confirmBtn: document.getElementById('confirmBtn'),
  confirmText: document.getElementById('confirmText'),
};

// Init wave bars
for (let i = 0; i < MAX_BARS; i++) {
  const b = document.createElement('span');
  els.wave.appendChild(b);
}
const waveBars = els.wave.querySelectorAll('span');

// ==================== Persistence (IndexedDB) ====================
let db = null;
const DB_NAME = 'blitz_db';
const DB_VERSION = 1;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('meta')) d.createObjectStore('meta');
      if (!d.objectStoreNames.contains('audio')) d.createObjectStore('audio');
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = () => reject(req.error);
  });
}

function idbGet(store, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function idbPut(store, key, value) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(value, key);
    req.onsuccess = () => resolve(true);
    req.onerror = () => reject(req.error);
  });
}

function idbDelete(store, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(key);
    req.onsuccess = () => resolve(true);
    req.onerror = () => reject(req.error);
  });
}

async function loadNotes() {
  try {
    await openDB();
    const data = await idbGet('meta', 'notes');
    state.notes = data || [];
  } catch (e) {
    console.error('DB load error:', e);
    state.notes = [];
  }
  renderList();
}

async function saveMeta() {
  try {
    await idbPut('meta', 'notes', state.notes);
  } catch (e) {
    toast('Speichern fehlgeschlagen', true);
  }
}

async function saveAudio(id, blob) {
  try {
    await idbPut('audio', id, blob);
    return true;
  } catch (e) {
    toast('Speichern fehlgeschlagen', true);
    return false;
  }
}

async function loadAudio(id) {
  try {
    return await idbGet('audio', id);
  } catch {
    return null;
  }
}

async function deleteAudio(id) {
  try { await idbDelete('audio', id); } catch {}
}

// ==================== Recording ====================
function pickMimeType() {
  const candidates = [
    'audio/webm;codecs=opus',
    'audio/webm',
    'audio/mp4;codecs=mp4a.40.2',
    'audio/mp4',
    'audio/ogg;codecs=opus',
  ];
  for (const t of candidates) {
    if (window.MediaRecorder && MediaRecorder.isTypeSupported(t)) return t;
  }
  return '';
}

async function startRecording() {
  try {
    state.audioStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
    });
  } catch (e) {
    toast('Mikrofon-Zugriff verweigert', true);
    return;
  }

  state.mimeType = pickMimeType();
  const options = state.mimeType ? { mimeType: state.mimeType, audioBitsPerSecond: 64000 } : { audioBitsPerSecond: 64000 };

  try {
    state.mediaRecorder = new MediaRecorder(state.audioStream, options);
  } catch (e) {
    try { state.mediaRecorder = new MediaRecorder(state.audioStream); }
    catch (err) { toast('Aufnahme nicht unterstützt', true); cleanupStream(); return; }
  }

  state.audioChunks = [];
  state.mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) state.audioChunks.push(e.data); };
  state.mediaRecorder.onstop = onRecordingStop;
  state.mediaRecorder.start();

  // Audio level meter for waveform
  try {
    state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const src = state.audioContext.createMediaStreamSource(state.audioStream);
    state.analyser = state.audioContext.createAnalyser();
    state.analyser.fftSize = 64;
    src.connect(state.analyser);
  } catch {}

  state.recording = true;
  state.startTime = Date.now();

  els.recBtn.classList.add('recording');
  els.recBtn.setAttribute('aria-label', 'Aufnahme stoppen');
  els.micIcon.style.display = 'none';
  els.stopIcon.style.display = 'block';
  els.status.textContent = '● Aufnahme läuft';
  els.status.classList.add('live');
  els.timer.classList.add('live');
  els.wave.classList.add('live');
  els.hint.textContent = 'Tippen zum Stoppen · max. 10:00';

  if (navigator.vibrate) navigator.vibrate(20);

  state.timerInterval = setInterval(updateTimer, 100);
  state.waveInterval = setInterval(updateWave, 60);
}

function updateTimer() {
  const sec = (Date.now() - state.startTime) / 1000;
  els.timer.textContent = formatDuration(sec);
  if (sec >= state.maxDurationSec) stopRecording();
}

function updateWave() {
  if (!state.analyser) return;
  const data = new Uint8Array(state.analyser.frequencyBinCount);
  state.analyser.getByteFrequencyData(data);
  for (let i = 0; i < MAX_BARS; i++) {
    const v = data[Math.floor(i * data.length / MAX_BARS)] || 0;
    const h = Math.max(4, Math.min(32, (v / 255) * 36));
    waveBars[i].style.height = h + 'px';
  }
}

function stopRecording() {
  if (!state.recording) return;
  state.mediaRecorder.stop();
}

function cleanupStream() {
  if (state.audioStream) {
    state.audioStream.getTracks().forEach(t => t.stop());
    state.audioStream = null;
  }
  if (state.audioContext) {
    try { state.audioContext.close(); } catch {}
    state.audioContext = null;
  }
  state.analyser = null;
}

async function onRecordingStop() {
  const duration = (Date.now() - state.startTime) / 1000;
  clearInterval(state.timerInterval);
  clearInterval(state.waveInterval);

  state.recording = false;
  els.recBtn.classList.remove('recording');
  els.recBtn.setAttribute('aria-label', 'Aufnahme starten');
  els.micIcon.style.display = 'block';
  els.stopIcon.style.display = 'none';
  els.status.textContent = 'Speichern…';
  els.status.classList.remove('live');
  els.timer.classList.remove('live');
  els.wave.classList.remove('live');
  els.timer.textContent = '00:00';
  els.hint.textContent = 'Tippen zum Aufnehmen';
  waveBars.forEach(b => b.style.height = '6px');

  if (navigator.vibrate) navigator.vibrate([10, 40, 10]);

  cleanupStream();

  if (duration < 0.5) {
    els.status.textContent = 'Bereit';
    toast('Zu kurz – verworfen');
    return;
  }

  const blob = new Blob(state.audioChunks, { type: state.mimeType || 'audio/webm' });

  const id = 'n_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
  const note = {
    id,
    timestamp: Date.now(),
    duration,
    mime: state.mimeType || 'audio/webm',
    size: blob.size,
  };

  const ok = await saveAudio(id, blob);
  if (!ok) { els.status.textContent = 'Bereit'; return; }

  state.notes.unshift(note);
  await saveMeta();
  renderList();
  els.status.textContent = 'Bereit';
  toast('Gespeichert · ' + formatDuration(duration));
}


// ==================== Playback ====================
async function togglePlay(id) {
  // Stop currently playing
  if (state.currentAudio && state.currentPlayingId === id) {
    state.currentAudio.pause();
    return;
  }
  if (state.currentAudio) {
    state.currentAudio.pause();
    state.currentAudio = null;
  }

  const data = await loadAudio(id);
  if (!data) { toast('Audio nicht gefunden', true); return; }

  const url = URL.createObjectURL(data);
  const audio = new Audio(url);
  state.currentAudio = audio;
  state.currentPlayingId = id;

  const noteEl = document.querySelector('[data-id="' + id + '"]');
  if (noteEl) {
    noteEl.classList.add('active');
    const btn = noteEl.querySelector('.play-btn');
    btn.classList.add('playing');
    btn.innerHTML = pauseSVG();
    const fill = noteEl.querySelector('.progress-fill');

    audio.ontimeupdate = () => {
      if (audio.duration) fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
    };
    audio.onpause = () => {
      btn.classList.remove('playing');
      btn.innerHTML = playSVG();
    };
    audio.onended = () => {
      noteEl.classList.remove('active');
      btn.classList.remove('playing');
      btn.innerHTML = playSVG();
      fill.style.width = '0%';
      URL.revokeObjectURL(audio.src);
      state.currentAudio = null;
      state.currentPlayingId = null;
    };
  }
  audio.play().catch(() => toast('Wiedergabe fehlgeschlagen', true));
}

// ==================== Rendering ====================
function renderList() {
  const filter = els.search.value.trim().toLowerCase();
  let notes = state.notes;
  if (filter) {
    notes = notes.filter(n => {
      const s = formatDateLong(n.timestamp).toLowerCase() + ' ' + formatTime(n.timestamp);
      return s.includes(filter);
    });
  }

  if (!notes.length) {
    els.list.innerHTML = `<div class="empty">${state.notes.length ? 'Nichts gefunden' : 'Noch keine Notiz.'}<small>${state.notes.length ? '' : 'Tippe auf den Knopf'}</small></div>`;
    return;
  }

  // Group by date
  const groups = {};
  for (const n of notes) {
    const key = dateKey(n.timestamp);
    if (!groups[key]) groups[key] = [];
    groups[key].push(n);
  }

  let html = '';
  for (const key of Object.keys(groups)) {
    const items = groups[key];
    html += `<div class="day-group">
      <div class="day-label">${dateLabel(items[0].timestamp)}<span class="count">${items.length}</span></div>`;
    for (const n of items) {
      html += renderNote(n);
    }
    html += `</div>`;
  }
  els.list.innerHTML = html;

  // Wire up
  els.list.querySelectorAll('.play-btn').forEach(b => {
    b.onclick = () => togglePlay(b.dataset.id);
  });
  els.list.querySelectorAll('.delete-btn').forEach(b => {
    b.onclick = () => askDelete(b.dataset.id);
  });
  els.list.querySelectorAll('.download-btn').forEach(b => {
    b.onclick = () => downloadNote(b.dataset.id);
  });
}

function renderNote(n) {
  return `<div class="note" data-id="${n.id}">
    <button class="play-btn" data-id="${n.id}" aria-label="Abspielen">${playSVG()}</button>
    <div class="note-info">
      <div class="note-time">${formatTime(n.timestamp)}</div>
      <div class="note-meta">
        <span>${formatDuration(n.duration)}</span>
        <span class="dot"></span>
        <span>${formatSize(n.size)}</span>
      </div>
      <div class="progress"><div class="progress-fill"></div></div>
    </div>
    <div class="note-actions">
      <button class="mini-btn download-btn" data-id="${n.id}" aria-label="Download">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button class="mini-btn danger delete-btn" data-id="${n.id}" aria-label="Löschen">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      </button>
    </div>
  </div>`;
}

function playSVG() {
  return '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
}
function pauseSVG() {
  return '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>';
}

// ==================== Helpers ====================
function pad(n) { return n < 10 ? '0' + n : '' + n; }

function formatDuration(s) {
  s = Math.max(0, Math.floor(s));
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return pad(m) + ':' + pad(sec);
}

function formatTime(ts) {
  const d = new Date(ts);
  return pad(d.getHours()) + ':' + pad(d.getMinutes());
}

function dateKey(ts) {
  const d = new Date(ts);
  return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
}

function dateLabel(ts) {
  const d = new Date(ts);
  const today = new Date();
  const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
  const isSameDay = (a, b) => a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();

  if (isSameDay(d, today)) return 'Heute';
  if (isSameDay(d, yesterday)) return 'Gestern';

  const monthNames = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  const dayNames = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  return `${dayNames[d.getDay()]} · ${d.getDate()}. ${monthNames[d.getMonth()]}${d.getFullYear() !== today.getFullYear() ? ' ' + d.getFullYear() : ''}`;
}

function formatDateLong(ts) {
  const d = new Date(ts);
  return `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()} ${formatTime(ts)}`;
}

function formatSize(bytes) {
  if (!bytes) return '–';
  const kb = bytes / 1024;
  if (kb < 1024) return Math.round(kb) + ' KB';
  return (kb / 1024).toFixed(1) + ' MB';
}

// ==================== Toast ====================
let toastTimer = null;
function toast(msg, isError = false) {
  els.toast.textContent = msg;
  els.toast.classList.toggle('error', isError);
  els.toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => els.toast.classList.remove('show'), 2500);
}

// ==================== Delete ====================
function askDelete(id) {
  state.pendingDeleteId = id;
  const note = state.notes.find(n => n.id === id);
  if (note) {
    els.confirmText.textContent = `Notiz vom ${formatDateLong(note.timestamp)} unwiderruflich löschen.`;
  }
  els.modal.classList.add('show');
}

async function doDelete() {
  const id = state.pendingDeleteId;
  if (!id) return;
  if (state.currentPlayingId === id && state.currentAudio) {
    state.currentAudio.pause();
    state.currentAudio = null;
  }
  state.notes = state.notes.filter(n => n.id !== id);
  await deleteAudio(id);
  await saveMeta();
  els.modal.classList.remove('show');
  state.pendingDeleteId = null;
  renderList();
  toast('Gelöscht');
}

// ==================== Download ====================
async function downloadNote(id) {
  const note = state.notes.find(n => n.id === id);
  if (!note) return;
  const blob = await loadAudio(id);
  if (!blob) { toast('Audio nicht gefunden', true); return; }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const ext = note.mime.includes('mp4') ? 'm4a' : note.mime.includes('ogg') ? 'ogg' : 'webm';
  a.download = `blitz_${dateKey(note.timestamp)}_${formatTime(note.timestamp).replace(':','-')}.${ext}`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

async function exportAll() {
  if (!state.notes.length) { toast('Nichts zu exportieren'); return; }
  toast('Lade ' + state.notes.length + ' Notizen…');
  for (const n of state.notes) {
    await downloadNote(n.id);
    await new Promise(r => setTimeout(r, 250));
  }
}

// ==================== Wire up ====================
els.recBtn.onclick = () => state.recording ? stopRecording() : startRecording();
els.search.oninput = renderList;
els.exportBtn.onclick = exportAll;
els.cancelBtn.onclick = () => { els.modal.classList.remove('show'); state.pendingDeleteId = null; };
els.confirmBtn.onclick = doDelete;
els.modal.onclick = (e) => { if (e.target === els.modal) els.cancelBtn.click(); };

// Spacebar shortcut on desktop
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
    e.preventDefault();
    els.recBtn.click();
  }
});

// Stop recording if page hidden (preserves data)
document.addEventListener('visibilitychange', () => {
  if (document.hidden && state.recording) stopRecording();
});

// Init
loadNotes();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.log('SW reg failed:', err));
  });
}
</script>
